<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学実験</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }
        h2 {
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .survey-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .survey-table th, .survey-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        .survey-table th:first-child, .survey-table td:first-child {
            text-align: left;
            width: 40%;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            display: block;
            margin: 20px auto 0;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .bandit-area {
            display: flex;
            justify-content: space-around;
            margin: 40px 0;
        }
        .arm-btn {
            width: 100px;
            height: 100px;
            font-size: 24px;
            background-color: #2196F3;
            margin: 0;
        }
        .arm-btn:hover {
            background-color: #0b7dda;
        }
        #feedback {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            height: 40px;
            margin-bottom: 20px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            margin-bottom: 20px;
            padding: 10px;
            background: #e9ecef;
            border-radius: 4px;
        }
        .radio-list label {
            display: block;
            margin-bottom: 10px;
            padding: 10px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }
        .radio-list label:hover {
            background: #e2e6ea;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="screen1" class="screen active">
        <h2>事前アンケート</h2>
        <div class="form-group">
            <label for="age"><strong>年齢：</strong></label>
            <input type="number" id="age" min="18" max="100" style="width: 80px; padding: 5px;"> 歳
        </div>
        <p>以下の項目について、あなた自身に最もあてはまるものを1つ選んでください。（1: 全くあてはまらない ～ 7: 非常にあてはまる）</p>
        <table class="survey-table" id="survey-table">
            <thead>
                <tr>
                    <th>質問項目</th>
                    <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
        <button onclick="nextScreen(1, 2)">次へ</button>
    </div>

    <div id="screen2" class="screen">
        <h2>教示</h2>
        <p style="font-size: 18px; font-weight: bold; border: 2px solid #f44336; padding: 20px; border-radius: 8px;">
            本課題では，あなたの意思決定プロセスも評価対象になります。<br><br>
            各試行の結果だけでなく，なぜその選択をしたのかを，所定のタイミングで簡潔に記録してください。
        </p>
        <button onclick="startDemo()">課題へ進む</button>
    </div>

    <div id="screen3" class="screen">
        <h2 id="task-title">デモ課題</h2>
        <div class="status-bar">
            <span id="trial-counter">試行: 1 / 10</span>
            <span id="score-counter">獲得ポイント: 0</span>
        </div>
        <div id="feedback"></div>
        <div class="bandit-area">
            <button class="arm-btn" onclick="selectArm(0)">A</button>
            <button class="arm-btn" onclick="selectArm(1)">B</button>
            <button class="arm-btn" onclick="selectArm(2)">C</button>
        </div>
    </div>

    <div id="screen4" class="screen">
        <h2>事後アンケート</h2>
        <p>本課題に取り組む際、あなたが特に意識していたこととして、最も近いものを1つ選んでください。</p>
        <div class="radio-list">
            <label><input type="radio" name="manip_check" value="1"> １．自分がなぜその選択をしたのかという判断のプロセスを、他者に説明できるようにすること</label>
            <label><input type="radio" name="manip_check" value="2"> ２．自分の選択によってなぜその結果になったのかを、他者に説明できるようにすること</label>
            <label><input type="radio" name="manip_check" value="3"> ３．他者への説明よりも、できるだけよい結果を出すことそのものを重視すること</label>
        </div>
        <button onclick="finishExperiment()">終了する</button>
    </div>

    <div id="screen5" class="screen">
        <h2>実験終了</h2>
        <p>ご協力ありがとうございました。</p>
        <p>（実験データをダウンロード）</p>
        <button onclick="downloadCSV()">結果をダウンロード (CSV)</button>
    </div>

</div>

<script>
    // --- 質問項目データ ---
    const questions = [
        "なにについても、最高のものを常に選ぶようにしている。",
        "「そこそこ」というところで妥協するのは好きではない。",
        "最高や最上を求めるタイプだ。",
        "何をしようとするときでも、成功や到達の基準を最高のところに置く。",
        "どれだけ時間がかかっても、最高の選択肢を待つ。",
        "なにかを選ぶときに、次善の選択肢で満足することはない。",
        "すべての選択肢が明らかになる前に決断を下すのは不愉快だ。",
        "選択に迫られたときには必ず、そのときには選べないものも含めて、すべての可能性について考えるようにしている。",
        "絶対に妥協しない。"
    ];

    // --- 実験データ保存用オブジェクト ---
    let experimentData = {
        age: null,
        survey: [],
        trials: [],
        manipulationCheck: null
    };

    // --- バンディット課題のパラメータ ---
    const TARGET_PROBS = [0.3, 0.5, 0.7]; 
    let currentProbs = []; // 参加者ごとにシャッフルして割り当てる
    const TRIALS_PER_BLOCK = 3;
    const NUM_BLOCKS = 3;
    const DEMO_TRIALS = 3;
    
    let isDemo = true;
    let currentBlock = 0;
    let currentTrial = 0;
    let totalScore = 0;
    let blockScore = 0;
    let trialStartTime = 0;

    // --- 初期化処理 ---
    window.onload = function() {
        const tbody = document.querySelector('#survey-table tbody');
        questions.forEach((q, index) => {
            let tr = document.createElement('tr');
            let tdQ = document.createElement('td');
            tdQ.textContent = `${index + 1}. ${q}`;
            tr.appendChild(tdQ);
            for(let i=1; i<=7; i++) {
                let td = document.createElement('td');
                td.innerHTML = `<input type="radio" name="q${index}" value="${i}">`;
                tr.appendChild(td);
            }
            tbody.appendChild(tr);
        });

        // 確率のランダマイズ
        currentProbs = TARGET_PROBS.sort(() => Math.random() - 0.5);
    };

    // --- 画面遷移関数 ---
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen${screenId}`).classList.add('active');
    }

    function nextScreen(current, next) {
        if(current === 1) {
            const age = document.getElementById('age').value;
            if(!age) { alert('年齢を入力してください。'); return; }
            
            let surveyResults = [];
            for(let i=0; i<questions.length; i++) {
                const checked = document.querySelector(`input[name="q${i}"]:checked`);
                if(!checked) { alert('未回答の質問があります。'); return; }
                surveyResults.push(parseInt(checked.value));
            }
            experimentData.age = age;
            experimentData.survey = surveyResults;
        }
        showScreen(next);
    }

    // --- バンディット課題ロジック ---
    function startDemo() {
        isDemo = true;
        currentTrial = 1;
        totalScore = 0;
        document.getElementById('task-title').innerText = "デモ課題 (練習)";
        updateStatus();
        showScreen(3);
        trialStartTime = performance.now();
    }

    function startMainBlock() {
        isDemo = false;
        currentBlock++;
        currentTrial = 1;
        blockScore = 0;
        document.getElementById('task-title').innerText = `本課題 (ブロック ${currentBlock} / ${NUM_BLOCKS})`;
        updateStatus();
        showScreen(3);
        trialStartTime = performance.now();
    }

    function selectArm(armIndex) {
        // 連打防止
        const buttons = document.querySelectorAll('.arm-btn');
        buttons.forEach(b => b.disabled = true);

        const rt = performance.now() - trialStartTime;
        
        let prob = isDemo ? 0.5 : currentProbs[armIndex];
        let isWin = Math.random() < prob;
        let reward = isWin ? 10 : 0; 

        totalScore += reward;
        if(!isDemo) blockScore += reward;

        // データ記録
        experimentData.trials.push({
            phase: isDemo ? 'demo' : 'main',
            block: currentBlock,
            trial: currentTrial,
            choice: armIndex,
            reward: reward,
            rt: Math.round(rt)
        });

        // フィードバック表示
        const fbDiv = document.getElementById('feedback');
        if(isWin) {
            fbDiv.innerText = `+${reward} ポイント！`;
            fbDiv.style.color = '#4CAF50';
        } else {
            fbDiv.innerText = "+0 ポイント";
            fbDiv.style.color = '#f44336';
        }

        updateStatus();

        // 次の試行へ
        setTimeout(() => {
            fbDiv.innerText = "";
            buttons.forEach(b => b.disabled = false);
            
            let maxTrials = isDemo ? DEMO_TRIALS : TRIALS_PER_BLOCK;
            if (currentTrial < maxTrials) {
                currentTrial++;
                updateStatus();
                trialStartTime = performance.now();
            } else {
                endBlock();
            }
        }, 800);
    }

    function updateStatus() {
        let maxTrials = isDemo ? DEMO_TRIALS : TRIALS_PER_BLOCK;
        document.getElementById('trial-counter').innerText = `試行: ${currentTrial} / ${maxTrials}`;
        document.getElementById('score-counter').innerText = `合計獲得ポイント: ${totalScore}`;
    }

    function endBlock() {
        if(isDemo) {
            alert("デモ課題が終了しました。これより本課題（50試行×3セット）を開始します。");
            startMainBlock();
        } else {
            // ブロック間インターバル処理（休憩を挟むためのアラートのみ表示し、記述を廃止）
            if (currentBlock < NUM_BLOCKS) {
                alert(`ブロック ${currentBlock} が終了しました。「OK」を押すと次のブロックが開始されます。適宜休憩をとってください。`);
                startMainBlock();
            } else {
                // 全ブロック終了で事後アンケートへ
                showScreen(4); 
            }
        }
    }

    function finishExperiment() {
        const manipCheck = document.querySelector('input[name="manip_check"]:checked');
        if(!manipCheck) {
            alert("項目を選択してください。");
            return;
        }
        experimentData.manipulationCheck = parseInt(manipCheck.value);
        showScreen(5);
    }

    // --- データダウンロード処理 (CSV) ---
    function downloadCSV() {
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // BOM for Excel

        // 1. フェーズ情報
        const surveySum = experimentData.survey.reduce((a, b) => a + b, 0);
        csvContent += "=== Participant Info ===\n";
        csvContent += `Age,${experimentData.age}\n`;
        csvContent += `Max_Scale_Sum,${surveySum}\n`;
        csvContent += `Max_Scale_Items,${experimentData.survey.join("|")}\n`;
        csvContent += `Manipulation_Check_Answer,${experimentData.manipulationCheck}\n`;
        csvContent += `Assigned_Probs(A/B/C),${currentProbs.join("/")}\n\n`;

        // 2. 試行データ
        csvContent += "=== Trial Data ===\n";
        csvContent += "phase,block,trial,choice,reward,rt\n";
        experimentData.trials.forEach(t => {
            csvContent += `${t.phase},${t.block},${t.trial},${t.choice},${t.reward},${t.rt}\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `experiment_data_${Date.now()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
